---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: edc-issuer-ingress
  namespace: mvd
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - http:
        paths:
          # Issuer Service - Admin API
          - path: /issuer/ad
            pathType: Prefix
            backend:
              service:
                name: dataspace-issuer-service
                port:
                  number: 10012
          # Issuer IdentityHub
          - path: /issuer/cs
            pathType: Prefix
            backend:
              service:
                name: dataspace-issuer-service
                port:
                  number: 10016
