  namespace: mvd
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - http:
        paths:
          # Provider Manufacturing Control Plane - Management API
          - path: /provider-manufacturing/cp
            pathType: Prefix
            backend:
              service:
                name: provider-manufacturing-controlplane
                port:
                  number: 8081
          # Provider Manufacturing Control Plane - DSP Protocol
          - path: /provider-manufacturing/dsp
            pathType: Prefix
            backend:
              service:
                name: provider-manufacturing-controlplane
                port:
                  number: 8082
          # Provider Manufacturing Data Plane - Public API
          - path: /provider-manufacturing/dp
            pathType: Prefix
            backend:
              service:
                name: provider-manufacturing-dataplane
                port:
                  number: 11002

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: edc-consumer-ingress
  namespace: mvd
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - http:
        paths:
          # Consumer Control Plane - Management API
          - path: /consumer/cp
            pathType: Prefix
            backend:
              service:
                name: consumer-controlplane
                port:
                  number: 8081
          # Consumer Control Plane - DSP Protocol
          - path: /consumer/dsp
            pathType: Prefix
            backend:
              service:
                name: consumer-controlplane
                port:
                  number: 8082
          # Consumer Data Plane - Public API
          - path: /consumer/dp
            pathType: Prefix
            backend:
              service:
                name: consumer-dataplane
                port:
                  number: 11002

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: edc-identityhub-ingress
  namespace: mvd
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - http:
        paths:
          # Consumer IdentityHub - Credentials/Identity/DID/STS
          - path: /consumer/cs
            pathType: Prefix
            backend:
              service:
                name: consumer-identityhub
                port:
                  number: 7082
          # Provider IdentityHub
          - path: /provider/cs
            pathType: Prefix
            backend:
              service:
                name: provider-identityhub
                port:
                  number: 7082

---
