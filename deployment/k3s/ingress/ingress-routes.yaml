###############################################################################
# Traefik IngressRoute Definitions for EDC Gaia-X Dataspace
#
# Replaces the NGINX Ingress from MVD's KinD setup with Traefik IngressRoutes.
# Maps external paths to internal EDC services, mirroring the MVD routing
# convention: /<participant>/<component>/...
#
# These routes match what seed-k8s.sh expects (e.g., http://127.0.0.1/provider-qna/cp)
###############################################################################

# ============================================================================
# Kubernetes Ingress resources (works with Traefik's Kubernetes Ingress provider)
# ============================================================================
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: edc-provider-qna-ingress
  namespace: mvd
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - http:
        paths:
          # Provider Q&A Control Plane - Management API
          - path: /provider-qna/cp
            pathType: Prefix
            backend:
              service:
                name: provider-qna-controlplane
                port:
                  number: 8081
          # Provider Q&A Control Plane - DSP Protocol
          - path: /provider-qna/dsp
            pathType: Prefix
            backend:
              service:
                name: provider-qna-controlplane
                port:
                  number: 8082
          # Provider Q&A Data Plane - Public API
          - path: /provider-qna/dp
            pathType: Prefix
            backend:
              service:
                name: provider-qna-dataplane
                port:
                  number: 11002

---
apiVersion: networking.k8s.io/v1
kind: Ingress
