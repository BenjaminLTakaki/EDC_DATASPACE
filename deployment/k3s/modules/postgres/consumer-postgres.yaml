###############################################################################
# Consumer PostgreSQL + PostGIS - K3s Deployment
#
# Hosts databases for:
#   - consumer (Consumer connector control plane state)
#   - consumer IdentityHub shares this database
#
# Uses PostGIS for geospatial ODRL policy evaluation (Phase 3).
###############################################################################
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: consumer-postgres-pvc
  labels:
    app: postgres
    role: consumer
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: consumer-postgres-init
  labels:
    app: postgres
    role: consumer
data:
  init.sql: |
    -- Consumer PostgreSQL Initialization
    CREATE EXTENSION IF NOT EXISTS postgis;

    -- Consumer connector + IdentityHub database
    CREATE USER consumer WITH ENCRYPTED PASSWORD 'consumer' SUPERUSER;
    CREATE DATABASE consumer;

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer-postgres
  labels:
    app: postgres
    role: consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
      role: consumer
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: postgres
        role: consumer
    spec:
      containers:
        - name: postgres
          image: postgis/postgis:16-3.4-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: consumer-postgres-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: consumer-postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: consumer-postgres-pvc
        - name: init-scripts
          configMap:
            name: consumer-postgres-init

---
apiVersion: v1
kind: Service
metadata:
  name: consumer-postgres-service
  labels:
    app: postgres
    role: consumer
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: pg-port
  selector:
    app: postgres
    role: consumer
